<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractor Registration - Avyan Pragati</title>
    <link rel="icon" type="image/png" href="avyanpragati.png">
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com">
    <link rel="dns-prefetch" href="https://maps.googleapis.com">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e6edf5 100%);
            min-height: 100vh;
            padding: 60px 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(255,153,51,.08) 0%, transparent 50%),
                       radial-gradient(circle at 70% 80%, rgba(19,136,8,.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .signup-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, .95) 0%, rgba(255, 255, 255, .92) 100%);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            box-shadow: 0 16px 64px rgba(0,0,0,0.12), 0 0 0 1px rgba(255,153,51,.06);
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,.6);
        }
        .signup-header {
            background: linear-gradient(135deg, #1B3A5C 0%, #2D5F8A 100%);
            color: white;
            padding: 48px 36px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .signup-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,153,51,.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .signup-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            position: relative;
        }
        .signup-header p {
            font-size: 15px;
            opacity: 0.95;
            line-height: 1.6;
            position: relative;
        }
        .signup-icon {
            font-size: 72px;
            margin-bottom: 20px;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,.2));
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .signup-body {
            padding: 48px 40px;
        }
        .form-section {
            margin-bottom: 36px;
        }
        .form-section-title {
            font-size: 17px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(255,153,51,.15);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.01em;
        }
        .form-section-title span {
            font-size: 20px;
            filter: drop-shadow(0 2px 4px rgba(255,153,51,.2));
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group-full {
            grid-column: 1 / -1;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 10px;
            letter-spacing: -0.01em;
        }
        .required {
            color: #ef4444;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e1e7ef;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            background: rgba(255,255,255,.6);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 4px rgba(0,0,0,.03);
            color: #0f172a;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #FF9933;
            background: rgba(255,255,255,.95);
            box-shadow: 0 0 0 4px rgba(255, 153, 51, 0.1), 0 4px 12px rgba(255,153,51,.15);
            transform: translateY(-2px);
        }
        .form-input:hover, .form-select:hover {
            border-color: rgba(255,153,51,.3);
        }
        .btn-signup {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FF9933 0%, #f97316 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(255, 153, 51, .35), inset 0 1px 0 rgba(255,255,255,.2);
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }
        .btn-signup::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-signup:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(255, 153, 51, 0.45), inset 0 1px 0 rgba(255,255,255,.3);
        }
        .btn-signup:hover::before {
            opacity: 1;
        }
        .btn-signup:active {
            transform: translateY(-1px);
        }
        .error-msg, .success-msg {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }
        .error-msg {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #991b1b;
            border: 1.5px solid #fca5a5;
        }
        .success-msg {
            background: linear-gradient(135deg, #d1fae5 0%, #bbf7d0 100%);
            color: #065f46;
            border: 1.5px solid #86efac;
        }
        .login-link {
            text-align: center;
            margin-top: 28px;
            font-size: 15px;
            color: #64748b;
            font-weight: 500;
        }
        .login-link a {
            color: #FF9933;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.25s;
        }
        .login-link a:hover {
            text-decoration: underline;
            color: #e07a20;
        }
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        .back-link a {
            color: #475569;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.25s;
            opacity: 0.8;
        }
        .back-link a:hover {
            opacity: 1;
            text-decoration: underline;
        }
        .map-container {
            width: 100%;
            height: 320px;
            border-radius: 12px;
            overflow: hidden;
            border: 1.5px solid rgba(255,153,51,.2);
            margin-top: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,.08);
            transition: all 0.25s;
        }
        .map-container:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,.12);
            border-color: rgba(255,153,51,.3);
        }
        .map-help {
            font-size: 13px;
            color: #64748b;
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <div class="signup-icon"><img src="avyanpragati.png" alt="Avyan Pragati" style="height:52px;width:52px;object-fit:contain;border-radius:10px;"></div>
            <h1>Contractor Registration</h1>
            <p>Join our network of trusted contractors and infrastructure partners</p>
        </div>
        <div class="signup-body">
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>
            
            <form id="signupForm" onsubmit="handleSignup(event)">
                
                <div class="form-section">
                    <div class="form-section-title">
                        <span>🏢</span> Company Information
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Company Name <span class="required">*</span></label>
                            <input type="text" class="form-input" id="companyName" required 
                                   placeholder="e.g., ABC Infrastructure Ltd.">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Registration Number <span class="required">*</span></label>
                            <input type="text" class="form-input" id="regNumber" required 
                                   placeholder="e.g., CIN or GSTIN">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Company Type <span class="required">*</span></label>
                            <select class="form-select" id="companyType" required>
                                <option value="">Select Type</option>
                                <option value="Private Limited">Private Limited</option>
                                <option value="Public Limited">Public Limited</option>
                                <option value="Partnership">Partnership</option>
                                <option value="Sole Proprietorship">Sole Proprietorship</option>
                                <option value="LLP">LLP</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Years in Business <span class="required">*</span></label>
                            <input type="number" class="form-input" id="yearsInBusiness" required min="0" 
                                   placeholder="e.g., 5">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Specialization <span class="required">*</span></label>
                        <select class="form-select" id="specialization" required>
                            <option value="">Select Specialization</option>
                            <option value="Road Construction">Road Construction</option>
                            <option value="Bridge Construction">Bridge Construction</option>
                            <option value="Building Construction">Building Construction</option>
                            <option value="Water Supply">Water Supply & Drainage</option>
                            <option value="Electrical Works">Electrical Works</option>
                            <option value="Metro/Rail">Metro/Rail Infrastructure</option>
                            <option value="General Contractor">General Contractor (Multi-Category)</option>
                        </select>
                    </div>
                </div>

                
                <div class="form-section">
                    <div class="form-section-title">
                        <span>📍</span> Head Office Location
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">State <span class="required">*</span></label>
                            <select class="form-select" id="state" required onchange="updateMapLocation()">
                                <option value="">Select State</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">District <span class="required">*</span></label>
                            <input type="text" class="form-input" id="district" required 
                                   placeholder="e.g., Mumbai Suburban" onchange="updateMapLocation()">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Full Address <span class="required">*</span></label>
                        <input type="text" class="form-input" id="address" required 
                               placeholder="Street address, City, PIN">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Latitude</label>
                            <input type="number" class="form-input" id="lat" step="0.0001" 
                                   placeholder="Click map to set">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Longitude</label>
                            <input type="number" class="form-input" id="lng" step="0.0001" 
                                   placeholder="Click map to set">
                        </div>
                    </div>
                    
                    <div id="mapCanvas" class="map-container"></div>
                    <div class="map-help">💡 Click on the map to set your exact office location</div>
                </div>

                
                <div class="form-section">
                    <div class="form-section-title">
                        <span>📞</span> Contact Information
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Contact Person Name <span class="required">*</span></label>
                            <input type="text" class="form-input" id="contactName" required 
                                   placeholder="Full Name">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Designation <span class="required">*</span></label>
                            <input type="text" class="form-input" id="designation" required 
                                   placeholder="e.g., Project Manager">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Mobile Number <span class="required">*</span></label>
                            <input type="tel" class="form-input" id="mobile" required 
                                   placeholder="+91 9876543210">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email <span class="required">*</span></label>
                            <input type="email" class="form-input" id="email" required 
                                   placeholder="company@example.com">
                        </div>
                    </div>
                </div>

                
                <div class="form-section">
                    <div class="form-section-title">
                        <span>🔒</span> Account Security
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Password <span class="required">*</span></label>
                            <input type="password" class="form-input" id="password" required minlength="6"
                                   placeholder="Minimum 6 characters">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confirm Password <span class="required">*</span></label>
                            <input type="password" class="form-input" id="confirmPassword" required 
                                   placeholder="Re-enter password">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-signup">🏗️ Register as Contractor</button>
            </form>
            
            <div class="login-link">
                Already registered? <a href="contractor-login.html">Sign in here</a>
            </div>
        </div>
    </div>
    
    <div class="back-link">
        <a href="index.html">← Back to Home</a>
    </div>

    <script>
        const states = [
            'Andhra Pradesh', 'Arunachal Pradesh', 'Assam', 'Bihar', 'Chhattisgarh',
            'Goa', 'Gujarat', 'Haryana', 'Himachal Pradesh', 'Jharkhand',
            'Karnataka', 'Kerala', 'Madhya Pradesh', 'Maharashtra', 'Manipur',
            'Meghalaya', 'Mizoram', 'Nagaland', 'Odisha', 'Punjab',
            'Rajasthan', 'Sikkim', 'Tamil Nadu', 'Telangana', 'Tripura',
            'Uttar Pradesh', 'Uttarakhand', 'West Bengal', 'Delhi', 'Jammu and Kashmir',
            'Ladakh', 'Puducherry', 'Chandigarh'
        ];
        
        const stateSelect = document.getElementById('state');
        states.forEach(state => {
            const option = document.createElement('option');
            option.value = state;
            option.textContent = state;
            stateSelect.appendChild(option);
        });
        
        let map, marker;
        
        function initMap() {
            const india = { lat: 22.5, lng: 80.0 };
            map = new google.maps.Map(document.getElementById('mapCanvas'), {
                center: india,
                zoom: 5,
                mapTypeControl: true,
                streetViewControl: false
            });
            
            map.addListener('click', (e) => {
                const lat = e.latLng.lat();
                const lng = e.latLng.lng();
                
                document.getElementById('lat').value = lat.toFixed(4);
                document.getElementById('lng').value = lng.toFixed(4);
                
                if (marker) marker.setMap(null);
                
                marker = new google.maps.Marker({
                    position: e.latLng,
                    map: map,
                    icon: {
                        url: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                        scaledSize: new google.maps.Size(40, 40)
                    },
                    title: 'Office Location'
                });
            });
        }
        
        function updateMapLocation() {
        }
        
        window.onload = function() {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap&region=IN`;
            script.async = true;
            document.head.appendChild(script);
        };
    </script>

    <script type="module">
        import { auth, db, createUserWithEmailAndPassword, collection, setDoc, doc } from './firebase-config.js';
        
        window.handleSignup = async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match!';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const email = document.getElementById('email').value;
                
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const userId = userCredential.user.uid;
                
                const contractorData = {
                    userId: userId,
                    companyName: document.getElementById('companyName').value,
                    regNumber: document.getElementById('regNumber').value,
                    companyType: document.getElementById('companyType').value,
                    yearsInBusiness: parseInt(document.getElementById('yearsInBusiness').value),
                    specialization: document.getElementById('specialization').value,
                    state: document.getElementById('state').value,
                    district: document.getElementById('district').value,
                    address: document.getElementById('address').value,
                    lat: parseFloat(document.getElementById('lat').value) || null,
                    lng: parseFloat(document.getElementById('lng').value) || null,
                    contactName: document.getElementById('contactName').value,
                    designation: document.getElementById('designation').value,
                    mobile: document.getElementById('mobile').value,
                    email: email,
                    rating: 0,
                    completedJobs: 0,
                    activeJobs: 0,
                    status: 'active',
                    createdAt: Date.now(),
                    lastUpdated: Date.now()
                };
                
                await setDoc(doc(db, 'contractors', userId), contractorData);
                
                localStorage.setItem('contractorInfo_' + userId, JSON.stringify(contractorData));
                
                successMsg.textContent = '✅ Registration successful! Redirecting to login...';
                successMsg.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'contractor-login.html';
                }, 2000);
                
            } catch (error) {
                console.error('Signup error:', error);
                errorMsg.textContent = error.message || 'Registration failed. Please try again.';
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>
</html>
